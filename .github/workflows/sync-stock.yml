name: Sync stock + deploy to Pages

on:
  schedule:
    - cron: "0 2 * * *"   # una vez al día, 02:00 UTC (04:00 CEST verano / 03:00 CET invierno)
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Download CSVs from FTP (stock + vehiculos)
        env:
          FTP_HOST:            ${{ secrets.FTP_HOST }}
          FTP_PORT:            ${{ secrets.FTP_PORT }}
          FTP_USER:            ${{ secrets.FTP_USER }}
          FTP_PASSWORD:        ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH:     ${{ secrets.FTP_REMOTE_PATH }}
          FTP_REMOTE_PATH_VEH: ${{ secrets.FTP_REMOTE_PATH_VEH }}
          FTP_SECURE:          ${{ secrets.FTP_SECURE }}
        run: node scripts/sync-stock.js

      - name: Build index + family JSONs + vehiculos.json
        run: node scripts/build-index.js

      - name: Prepare site for Pages
        run: |
          rm -rf node_modules
          rm -f data/stock.csv
          rm -f data/vehiculos.csv

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
